<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background tile -->
  <rect width="32" height="32" rx="7" fill="#0a0e1a"/>
  <!-- Robot head -->
  <rect x="9" y="6" width="14" height="10" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.8"/>
  <!-- Eyes -->
  <circle cx="13" cy="11" r="1.5" fill="#00d4ff"/>
  <circle cx="19" cy="11" r="1.5" fill="#00d4ff"/>
  <!-- Antenna -->
  <line x1="16" y1="2" x2="16" y2="6" stroke="#00d4ff" stroke-width="1.6" stroke-linecap="round"/>
  <circle cx="16" cy="1.5" r="1.2" fill="#00d4ff"/>
  <!-- Body -->
  <rect x="10" y="17" width="12" height="9" rx="2" fill="none" stroke="#00a8cc" stroke-width="1.8"/>
  <!-- Arms -->
  <rect x="5"  y="18" width="5" height="6" rx="2" fill="none" stroke="#00a8cc" stroke-width="1.5"/>
  <rect x="22" y="18" width="5" height="6" rx="2" fill="none" stroke="#00a8cc" stroke-width="1.5"/>
  <!-- Body center dot -->
  <circle cx="16" cy="21.5" r="1.2" fill="#00d4ff" opacity=".7"/>
</svg>
